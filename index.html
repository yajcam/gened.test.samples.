    top: 0;
    z-index: 100;

  }

    display: flex; align-items: center; gap: 7px;

  }
  .stat-num { font-size: 1.25rem; font-weight: 800; }
  .stat-num.correct  { color: #22863a; }
  .stat-num.wrong    { color: #c0392b; }
  .stat-num.total    { color: #1a56db; }
  .stat-num.pct      { color: #7c3aed; }

  /* Section headings */
  .section-label {
    background: #1a56db;
    color: #fff;
    font-size: .75rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 4px 4px 0 0;
    display: inline-block;
    margin-top: 32px;
    margin-bottom: 0;
  }

  /* Question card */
  .question-card {
    background: #fff;
    border: 1.5px solid #e2e8f0;
    border-radius: 0 10px 10px 10px;
    padding: 22px 24px 18px;
    margin-bottom: 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);

  .q-num  { font-size: .72rem; color: #718096; font-weight: 600; margin-bottom: 6px; }
  .q-text { font-size: 1rem; font-weight: 600; color: #1a202c; line-height: 1.55; margin-bottom: 16px; }

  /* Options */
  .options { list-style: none; display: flex; flex-direction: column; gap: 9px; }
  .option {
    display: flex; align-items: flex-start; gap: 11px;
    padding: 11px 14px;
    border: 1.5px solid #cbd5e0;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color .18s, background .18s, transform .12s;
    user-select: none;
    font-size: .95rem;
    color: #2d3748;
    background: #f7fafc;
    line-height: 1.45;
  }
  .option:hover:not(.locked) {
    border-color: #1a56db;
    background: #ebf4ff;
    transform: translateX(2px);
  }
  .option .opt-letter {
    min-width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid #a0aec0;
    display: flex; align-items: center; justify-content: center;
    font-size: .73rem; font-weight: 700; color: #718096;
    flex-shrink: 0; margin-top: 1px;
  }

  /* States */
  .option.correct {
    background: #f0fff4; border-color: #22863a; color: #145e30;
  }
  .option.correct .opt-letter {
    background: #22863a; border-color: #22863a; color: #fff;
  }
  .option.wrong {
    background: #fff5f5; border-color: #c0392b; color: #7b1c1c;
  }
  .option.wrong .opt-letter {
    background: #c0392b; border-color: #c0392b; color: #fff;
  }
  .option.locked { cursor: not-allowed; }
  .option.dimmed { opacity: .45; }

  /* Rationale box */
  .rationale {
    display: none;
    margin-top: 14px;
    padding: 13px 16px;
    background: #fffbeb;
    border-left: 4px solid #f59e0b;
    border-radius: 0 8px 8px 0;
    font-size: .88rem;
    color: #744210;
    line-height: 1.6;

  .rationale strong { display: block; margin-bottom: 4px; color: #92400e; font-size: .8rem; letter-spacing: .3px; text-transform: uppercase; }

  /* Results banner */
  #results-banner {
    display: none;
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #1a56db; color: #fff;
    padding: 14px 28px; border-radius: 50px;
    font-size: 1rem; font-weight: 700;

    z-index: 200;
    text-align: center;

    .question-card { padding: 16px 14px 14px; }
    header h1 { font-size: 1.2rem; }
    .option { font-size: .88rem; }

// ── Audio ──────────────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx;
function getActx() { if (!actx) actx = new AudioCtx(); return actx; }

function playCorrect() {
  const c = getActx();
  const o = c.createOscillator(), g = c.createGain();
  o.connect(g); g.connect(c.destination);
  o.frequency.setValueAtTime(523, c.currentTime);
  o.frequency.setValueAtTime(659, c.currentTime + .1);
  o.frequency.setValueAtTime(784, c.currentTime + .2);
  g.gain.setValueAtTime(.35, c.currentTime);
  g.gain.exponentialRampToValueAtTime(.001, c.currentTime + .55);
  o.start(); o.stop(c.currentTime + .55);
}
function playWrong() {
  const c = getActx();
  const o = c.createOscillator(), g = c.createGain();
  o.connect(g); g.connect(c.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(350, c.currentTime);
  o.frequency.setValueAtTime(200, c.currentTime + .15);
  g.gain.setValueAtTime(.25, c.currentTime);
  g.gain.exponentialRampToValueAtTime(.001, c.currentTime + .4);
  o.start(); o.stop(c.currentTime + .4);
}

// ── Score tracking ────────────────────────────────────────────────────
let correct = 0, wrong = 0, answered = 0, total = 0;
function updateScore(isCorrect) {
  answered++;
  if (isCorrect) correct++; else wrong++;
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent   = wrong;
  document.getElementById('sc-answered').textContent = answered;
  const pct = Math.round(correct / answered * 100);
  document.getElementById('sc-pct').textContent = pct + '%';
  if (answered === total) showFinalBanner();
}
function showFinalBanner() {
  const b = document.getElementById('results-banner');
  b.textContent = `🏁 Quiz complete! ${correct}/${total} correct (${Math.round(correct/total*100)}%)`;
  b.style.display = 'block';
  setTimeout(() => b.style.display = 'none', 6000);
}

// ── Build the quiz ─────────────────────────────────────────────────────
const container = document.getElementById('quiz-container');
const letters = ['A','B','C','D','E'];
let qGlobal = 0;

SECTIONS.forEach(sec => {
  const lbl = document.createElement('div');
  lbl.className = 'section-label';
  lbl.textContent = sec.label;
  container.appendChild(lbl);

  sec.questions.forEach(q => {
    qGlobal++;
    total++;
    const card = document.createElement('div');
    card.className = 'question-card';
    card.dataset.answered = '0';

    card.innerHTML = `
      <div class="q-num">Question ${qGlobal}</div>
      <div class="q-text">${q.text}</div>
      <ul class="options">
        ${q.options.map((opt, i) => `
          <li class="option" data-index="${i}"
            ondblclick="handleAnswer(this)"
            title="Double-click to answer">
            <span class="opt-letter">${letters[i]}</span>
            <span>${opt}</span>
          </li>`).join('')}
      </ul>
      <div class="rationale" id="rationale-${qGlobal}">
        <strong>📘 Explanation</strong>${q.rationale}
      </div>`;

    // Store correct answer on card
    card.dataset.correct = q.answer;
    card.dataset.qid = qGlobal;
    container.appendChild(card);
  });
});

document.getElementById('sc-total').textContent = total;

// ── Answer handler ─────────────────────────────────────────────────────
function handleAnswer(optionEl) {
  const card = optionEl.closest('.question-card');
  if (card.dataset.answered === '1') return; // already answered

  card.dataset.answered = '1';
  const chosen   = parseInt(optionEl.dataset.index);
  const correct  = parseInt(card.dataset.correct);
  const qid      = card.dataset.qid;
  const isRight  = chosen === correct;

  // Lock all options
  card.querySelectorAll('.option').forEach(el => {
    el.classList.add('locked');
    const idx = parseInt(el.dataset.index);
    if (idx === correct) {
      el.classList.add('correct');
    } else if (idx === chosen && !isRight) {
      el.classList.add('wrong');
    } else {
      el.classList.add('dimmed');
    }
  });

  // Show rationale
  document.getElementById('rationale-' + qid).classList.add('show');

  // Sound & score
  if (isRight) { playCorrect(); } else { playWrong(); }
  updateScore(isRight);
}
